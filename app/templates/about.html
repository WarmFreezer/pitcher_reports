<!DOCTYPE html>
<html lang="en" style="height: 100%;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baseball Analytics - About</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body onload="loadNavbar(); loadHeader('About - Baseball Analytics', '/static/resources/HomePlate.png');loadFooter();">
    <!-- Navbar Placeholder -->
    <div id="navbar-placeholder" style="background-color: var(--accent);"></div>

    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <main class="main-content">
        <div class="bubble about-bubble">
            <h2 class="about-lead">
                Pitcher Reports makes verbose TrackMan data easy to interpret. Build professional, coach-ready reports in minutes.
                <br>Including quick view on the website, downloadable PDFs, and custom branding options.
            </h2>

            <div class="comparison-toggle" aria-label="Before and after report comparison">
                <div class="toggle-tabs" role="tablist">
                    <button class="toggle-tab toggle-tab--active" role="tab" aria-selected="true" aria-controls="tab-before" data-tab="before">Before — Raw TrackMan</button>
                    <button class="toggle-tab" role="tab" aria-selected="false" aria-controls="tab-after" data-tab="after">After — Pitcher Report</button>
                </div>

                <div class="toggle-panel toggle-panel--active" id="tab-before" role="tabpanel">
                    <p class="comparison-subtitle">Scroll to see the full scale of raw TrackMan output</p>
                    <div class="comparison-scroll">
                        <iframe src="{{ url_for('static', filename='resources/TrackMan.htm') }}" title="TrackMan report example" class="comparison-iframe"></iframe>
                    </div>
                </div>

                <div class="toggle-panel toggle-panel--scrollable" id="tab-after" role="tabpanel">
                    <p class="comparison-subtitle">Readable pitcher report with school branding</p>
                    <img src="{{ url_for('static', filename='resources/PitcherReport.png') }}" alt="Pitcher report example, Used with permission" class="comparison-image--after">
                </div>
            </div>

            <script>
                document.querySelectorAll('.toggle-tab').forEach(tab => {
                    tab.addEventListener('click', () => {
                        document.querySelectorAll('.toggle-tab').forEach(t => {
                            t.classList.remove('toggle-tab--active');
                            t.setAttribute('aria-selected', 'false');
                        });
                        document.querySelectorAll('.toggle-panel').forEach(p => p.classList.remove('toggle-panel--active'));
                        tab.classList.add('toggle-tab--active');
                        tab.setAttribute('aria-selected', 'true');
                        document.getElementById('tab-' + tab.dataset.tab).classList.add('toggle-panel--active');
                    });
                });
            </script>
        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <script src="{{ url_for('static', filename='scripts.js') }}"></script>
</body>
</html>
